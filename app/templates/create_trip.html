{% extends 'base.html' %}

{% block title %}Создать поездку{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-3">Создание групповой поездки</h1>
        <p class="text-muted">Выберите параметры, стоимость обновится автоматически через HTMX.</p>

        <form id="trip-form" method="post" action="/trips">
          <div class="mb-3">
            <label for="direction" class="form-label">Направление</label>
            <select
              id="direction"
              name="direction"
              class="form-select"
              hx-post="/price-preview"
              hx-target="#price-preview"
              hx-trigger="change"
              hx-include="#trip-form"
            >
              {% for key, _ in directions.items() %}
              <option value="{{ key }}" {% if form.direction == key %}selected{% endif %}>
                {{ key|capitalize }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div>
            <div class="mb-3">
              <label for="people_count" class="form-label">Количество людей</label>
              <input
                type="number"
                min="1"
                id="people_count"
                name="people_count"
                value="{{ form.people_count }}"
                class="form-control"
                hx-post="/price-preview"
                hx-target="#price-preview"
                hx-trigger="input changed delay:300ms"
                hx-include="#trip-form, #direction"
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Опции</label>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value="true"
                  id="transport"
                  name="transport"
                  hx-post="/price-preview"
                  hx-target="#price-preview"
                  hx-trigger="change"
                  hx-include="#trip-form, #direction"
                />
                <label class="form-check-label" for="transport">Транспорт</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value="true"
                  id="food"
                  name="food"
                  hx-post="/price-preview"
                  hx-target="#price-preview"
                  hx-trigger="change"
                  hx-include="#trip-form, #direction"
                />
                <label class="form-check-label" for="food">Еда</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value="true"
                  id="activities"
                  name="activities"
                  hx-post="/price-preview"
                  hx-target="#price-preview"
                  hx-trigger="change"
                  hx-include="#trip-form, #direction"
                />
                <label class="form-check-label" for="activities">Активности</label>
              </div>
            </div>
          </div>

          <div id="price-preview">
            {% include '_price_preview.html' %}
          </div>

          <button type="submit" class="btn btn-primary w-100 mt-3">Создать поездку</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
