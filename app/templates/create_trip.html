{% extends 'base.html' %}

{% block title %}Новая поездка | Gettik{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-9">
    <div class="card app-card border-0 shadow-lg">
      <div class="card-body p-4 p-md-5">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-4">
          <div>
            <h1 class="h2 mb-1">Создание групповой поездки</h1>
            <p class="text-secondary mb-0">Соберите параметры, а цена обновится автоматически.</p>
          </div>
          <a href="/cabinet" class="btn btn-outline-primary align-self-start">← В кабинет</a>
        </div>

        <form id="trip-form" method="post" action="/trips" class="row g-4">
          <div class="col-md-6">
            <label for="direction" class="form-label">Направление</label>
            <select
              id="direction"
              name="direction"
              class="form-select form-select-lg"
              hx-post="/price-preview"
              hx-target="#price-preview"
              hx-trigger="change"
              hx-include="#trip-form"
            >
              {% for key, _ in directions.items() %}
              <option value="{{ key }}" {% if form.direction == key %}selected{% endif %}>{{ key|capitalize }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label for="people_count" class="form-label">Количество людей</label>
            <input
              type="number"
              min="1"
              id="people_count"
              name="people_count"
              value="{{ form.people_count }}"
              class="form-control form-control-lg"
              hx-post="/price-preview"
              hx-target="#price-preview"
              hx-trigger="input changed delay:300ms"
              hx-include="#trip-form, #direction"
            />
          </div>

          <div class="col-12">
            <label class="form-label">Опции</label>
            <div class="row g-3">
              <div class="col-md-4">
                <label class="option-tile">
                  <input class="form-check-input" type="checkbox" value="true" id="transport" name="transport" hx-post="/price-preview" hx-target="#price-preview" hx-trigger="change" hx-include="#trip-form, #direction" />
                  <span>Транспорт</span>
                </label>
              </div>
              <div class="col-md-4">
                <label class="option-tile">
                  <input class="form-check-input" type="checkbox" value="true" id="food" name="food" hx-post="/price-preview" hx-target="#price-preview" hx-trigger="change" hx-include="#trip-form, #direction" />
                  <span>Еда</span>
                </label>
              </div>
              <div class="col-md-4">
                <label class="option-tile">
                  <input class="form-check-input" type="checkbox" value="true" id="activities" name="activities" hx-post="/price-preview" hx-target="#price-preview" hx-trigger="change" hx-include="#trip-form, #direction" />
                  <span>Активности</span>
                </label>
              </div>
            </div>
          </div>

          <div class="col-12" id="price-preview">
            {% include '_price_preview.html' %}
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-lg w-100">Создать поездку</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
