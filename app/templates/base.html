<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Gettik{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', path='style.css') }}" rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg app-navbar sticky-top">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="{% if user %}/cabinet{% else %}/login{% endif %}">Gettik</a>
        {% if user %}
        <div class="d-flex align-items-center gap-2 ms-auto">
          <a class="btn btn-sm btn-outline-light" href="/">Новая поездка</a>
          <a class="btn btn-sm btn-outline-light" href="/cabinet">Личный кабинет</a>
          <form action="/logout" method="post" class="d-inline">
            <button class="btn btn-sm btn-light">Выйти</button>
          </form>
        </div>
        {% endif %}
      </div>
    </nav>

    <main class="container py-4 py-md-5">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
